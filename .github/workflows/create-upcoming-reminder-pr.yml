name: Create upcoming reminder issue

on:
  schedule:
    - cron: "0 7 * * 3"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-reminder-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate upcoming reminder text
        id: reminder
        run: >
          python scripts/generate_upcoming_reminder.py
          --input "${{ vars.REMINDER_INPUT_PATH || 'data/JC test schedule.csv' }}"
          --output "${{ vars.REMINDER_OUTPUT_PATH || 'reminders/upcoming.md' }}"
          --status-output "${{ vars.REMINDER_STATUS_OUTPUT_PATH || 'reminders/last-run.md' }}"
          --date-column "${{ vars.REMINDER_DATE_COLUMN || 'Date' }}"
          --name-column "${{ vars.REMINDER_NAME_COLUMN || 'Presenter' }}"
          --lookahead-days "${{ vars.REMINDER_LOOKAHEAD_DAYS || '7' }}"
          --github-output "$GITHUB_OUTPUT"

      - name: Create reminder issue
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ steps.reminder.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.reminder.outputs.issue_body }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = "jc-reminder";
            const title = process.env.ISSUE_TITLE;
            const body = process.env.ISSUE_BODY;

            const { data: labels } = await github.rest.issues.listLabelsForRepo({
              owner,
              repo,
              per_page: 100,
            });

            if (!labels.some((item) => item.name === label)) {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: label,
                color: "1d76db",
                description: "Automated JC reminder issues",
              });
            }

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: [label],
            });
            core.info(`Created issue #${created.data.number}`);
